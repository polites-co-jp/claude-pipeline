# デフォルトパイプライン定義
# [ [実装 → テストコード実装 → テスト実施](テスト失敗→実装修正) → レビュー ] x 最大3回(LGTM終了) → docs

name: "default"
description: "標準的な実装パイプライン"

steps:
  - name: "implement"
    description: "Issueの要件を実装"
    # model: "claude-sonnet-4-6"  # 省略時はグローバル/リポジトリ設定を使用
    prompt_template: |
      あなたはソフトウェアエンジニアです。
      以下のGitHub Issueの要件を実装してください。

      ## Issue #{issue_number}: {issue_title}
      {issue_body}

      ## 指示
      - まずリポジトリの構造とコードを読んで理解してください
      - 既存のコーディングスタイル・規約に従ってください
      - CLAUDE.md があればそのルールに従ってください
      - Antigravity の rule.md があればそのルールにも従ってください
      - 必要最小限の変更で実装してください
      - 新規ファイルは必要な場合のみ作成してください
      - セキュリティ脆弱性を作り込まないでください
    commit_prefix: "feat"
    allowed_tools: "Edit,Write,Bash,Glob,Grep,Read"
    max_turns: 50

  - name: "review"
    description: "[実装→テスト→レビュー]ループ（最大3回、LGTM で終了）"
    # model: "claude-opus-4-6"  # レビューは深い推論ができるモデル推奨
    review_mode: "feedback_only"
    max_iterations: 3
    review_target: "implement"

    # --- Phase 1: テストコード実装＆テスト実施（レビュー前に毎回実行） ---
    test_before_review: true
    test_prompt_template: |
      あなたはテストエンジニアです。
      以下の変更に対するテストコードを作成し、テストを実行してください。

      ## 変更差分（mainブランチからの差分）
      ```
      {git_diff_from_main}
      ```

      ## 指示
      - 既存のテストフレームワーク・テストパターンに従ってください
      - テストフレームワークが存在しない場合は、言語に適したものをセットアップしてください
      - 正常系・異常系・境界値をカバーしてください
      - テストを実行して全てパスすることを確認してください
      - テストが失敗した場合はその内容を報告してください（テストコード自体は正しい前提で）
    test_allowed_tools: "Edit,Write,Bash,Glob,Grep,Read"
    test_max_turns: 40
    test_commit_prefix: "test"

    # --- Phase 1.5: テスト失敗時の実装修正 ---
    # テスト実施が失敗した場合、実装コードを修正してテストを再実行する
    test_fix_max_retries: 3
    test_fix_prompt_template: |
      あなたはソフトウェアエンジニアです。
      テストが失敗しています。実装コードを修正してテストをパスさせてください。

      ## 元の Issue #{issue_number}: {issue_title}
      {issue_body}

      ## 現在の変更差分（ベースブランチからの差分）
      ```
      {git_diff_from_main}
      ```

      ## 前回のテスト結果
      {test_output}

      ## 指示
      - テストコードは正しい前提で、実装コードを修正してください
      - テストコードの変更は最小限にしてください（テスト自体のバグの場合のみ）
      - 修正後、テストを再実行して全てパスすることを確認してください
      - CLAUDE.md があればそのルールに従ってください
      - Antigravity の rule.md があればそのルールにも従ってください
    test_fix_allowed_tools: "Edit,Write,Bash,Glob,Grep,Read"
    test_fix_max_turns: 40
    test_fix_commit_prefix: "fix"

    # --- Phase 2: レビュー（読み取り専用） ---
    prompt_template: |
      あなたはシニアコードレビュアーです。
      以下の変更差分をレビューし、問題点を書き出してください。
      コードの修正は行わないでください。レビューコメントのみを出力してください。

      ## レビュー対象（ベースブランチからの差分）
      ```
      {git_diff_from_main}
      ```

      ## チェック項目
      1. バグ・ロジックエラー
      2. セキュリティ脆弱性（OWASP Top 10）
      3. パフォーマンス問題
      4. エッジケースの未処理
      5. コーディング規約違反
      6. 不要なコード・デバッグコードの残留

      ## 出力フォーマット
      問題がない場合は、1行目に以下のみを出力してください:
      LGTM

      問題がある場合は、以下の形式で問題点を列挙してください:
      NEEDS_FIX
      - [重要度: high/medium/low] ファイル名:行番号 - 問題の説明と修正案
      - [重要度: high/medium/low] ファイル名:行番号 - 問題の説明と修正案
      ...
    allowed_tools: "Glob,Grep,Read"
    max_turns: 30

    # --- Phase 3: レビュー指摘に基づく再実装（NEEDS_FIX の場合） ---
    reimpl_prompt_template: |
      あなたはソフトウェアエンジニアです。
      以下のレビュー指摘事項に基づいて、コードを修正してください。

      ## 元の Issue #{issue_number}: {issue_title}
      {issue_body}

      ## 現在の変更差分（ベースブランチからの差分）
      ```
      {git_diff_from_main}
      ```

      ## レビュー指摘事項
      {review_feedback}

      ## 指示
      - レビューで指摘された問題点を全て修正してください
      - 指摘されていない箇所は変更しないでください
      - CLAUDE.md があればそのルールに従ってください
      - Antigravity の rule.md があればそのルールにも従ってください
      - セキュリティ脆弱性を作り込まないでください

  - name: "docs"
    description: "ドキュメントの更新"
    # model: "claude-haiku-4-5"  # ドキュメント更新は軽量モデルで十分
    prompt_template: |
      以下の変更に伴い、ドキュメントの更新が必要か判断してください。

      ## 変更差分（mainブランチからの差分）
      ```
      {git_diff_from_main}
      ```

      ## 判断基準
      - 新しいAPIエンドポイントが追加された → API docsを更新
      - 設定項目が追加された → READMEを更新
      - 使い方が変わった → 関連ドキュメントを更新
      - 上記に該当しない → 何もしない

      必要な場合のみドキュメントを更新してください。
    commit_prefix: "docs"
    allowed_tools: "Edit,Write,Bash,Glob,Grep,Read"
    max_turns: 20
    skip_if_no_changes: true
